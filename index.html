<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A0E1F" />
    <title>Welcome to the Table — Black-owned Houston</title>
    <meta
      name="description"
      content="Discover verified Black-owned restaurants and stores across Greater Houston, community-vouched welcoming spaces, and the historic Black Wall Street districts. Everybody gets a seat at the table."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!--
      AEO: this FAQPage JSON-LD MIRRORS the visible FAQ rendered from src/data/faq.ts.
      Keep the two in sync (or prerender from the same source). See README / CLAUDE.md.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Welcome to the Table?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Welcome to the Table is a Houston app for discovering verified Black-owned restaurants and stores near you, with community-vouched welcoming spaces and a guide to the historic Black Wall Street districts. The promise is simple: everybody gets a seat at the table."
            }
          },
          {
            "@type": "Question",
            "name": "What are some of the best Black-owned restaurants in Houston?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Popular verified Black-owned restaurants in Houston include The Breakfast Klub in Midtown, Lucille’s near the Museum District, and Mikki’s Soul Food Cafe in Third Ward. Listings show real-time hours and a verification status so you know the ownership has been confirmed."
            }
          },
          {
            "@type": "Question",
            "name": "How does Welcome to the Table verify that a business is Black-owned?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ownership is community-verified. A listing moves from candidate to community-reported to verified once an owner confirms it or three independent community members confirm it. Every listing displays its current verification status, and no business is published on the word of AI alone."
            }
          },
          {
            "@type": "Question",
            "name": "Does it cover Black-owned businesses outside the city, like Pearland or Missouri City?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The default view shows spots within a 10-mile radius, and a Greater Houston toggle expands coverage across the metro — Pearland, Missouri City, Spring, Sugar Land, and surrounding areas."
            }
          },
          {
            "@type": "Question",
            "name": "What does the Welcome badge mean?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The Welcome badge means community members have vouched that a place is welcoming and that they were treated with respect. It is community testimony, not a safety guarantee, and the app never labels any place or area as dangerous."
            }
          },
          {
            "@type": "Question",
            "name": "Is Welcome to the Table available in Spanish and French?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The app is available in English, Spanish, and French, so visitors and residents across Greater Houston can use it in their own language."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
